# Optional: push the same image GitHub builds to Amazon ECR.
# Prerequisites: terraform apply in aws/terraform/, IAM user or OIDC role with ecr:PutImage, etc.
#
# GitHub repo secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION          (e.g. us-east-1)
#   AWS_ECR_REPOSITORY  (full URI: 123456789.dkr.ecr.us-east-1.amazonaws.com/resume-agent)

name: Deploy to ECR

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  push-ecr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.AWS_ECR_REPOSITORY }}:latest
            ${{ secrets.AWS_ECR_REPOSITORY }}:${{ github.sha }}
